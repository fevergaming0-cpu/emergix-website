<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Gallery - EMERGIX & RAHS</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#d60000;
color:white;
text-align:center;
padding:20px;
}

.gallery{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.back{
display:inline-block;
margin-top:10px;
background:white;
color:#d60000;
padding:10px 20px;
text-decoration:none;
border-radius:5px;
font-weight:bold;
}
</style>

</head>
<body>

<header>
<h1>EMERGIX & RAHS Fleet Gallery</h1>
<a href="index.html" class="back">Back to Home</a>
</header>

<div class="gallery" id="gallery-grid"></div>

<script src="script.js"></script>

</body>
</html>
